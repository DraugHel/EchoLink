name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Run tests and build
        run: npm run ci

      - name: Check committed changes for whitespace errors
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -Eeuo pipefail

          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git diff --check "${BASE_SHA}" "${GITHUB_SHA}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "${ZERO_SHA}" ]]; then
            git diff --check "${BEFORE_SHA}" "${GITHUB_SHA}"
          elif git rev-parse "${GITHUB_SHA}^" >/dev/null 2>&1; then
            git diff --check "${GITHUB_SHA}^" "${GITHUB_SHA}"
          else
            git diff-tree --check --root -r "${GITHUB_SHA}"
          fi
